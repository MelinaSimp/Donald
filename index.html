<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Donald — always on. Clap to wake.</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='7' fill='%23ff8a3d'/%3E%3C/svg%3E" />
  <style>
    :root { --accent: #ff8a3d; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif; color: #fff; }

    /* The three stacked, full-screen layers. */
    #scene { position: fixed; inset: 0; }
    .layer { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .bg-layer  { z-index: 1; }
    .orb-layer { z-index: 2; }   /* transparent, composites over the background */
    .label-layer { z-index: 3; pointer-events: none; } /* DOM labels (Tier 4) */

    /* Sub-agent labels — positioned to follow each avatar. The layer ignores
       pointer events so scene clicks pass through; each label re-enables them
       so hover works. */
    .agent-label {
      position: absolute; top: 0; left: 0; pointer-events: auto;
      text-align: center; white-space: nowrap; cursor: default;
      transition: opacity 0.18s ease;
      text-shadow: 0 1px 8px rgba(0,0,0,0.85);
      will-change: transform, opacity;
    }
    .agent-label .al-name {
      display: block; font-size: 13px; font-weight: 600; letter-spacing: 0.02em;
      color: #fff;
    }
    .agent-label .al-spec {
      display: block; font-size: 10.5px; margin-top: 1px; letter-spacing: 0.01em;
      color: var(--accent, #9fb3c8); opacity: 0.85;
    }
    .agent-label::before {
      content: ""; position: absolute; left: 50%; top: -7px;
      width: 5px; height: 5px; border-radius: 50%;
      transform: translateX(-50%);
      background: var(--accent, #fff);
      box-shadow: 0 0 8px 2px var(--accent, #fff);
    }
    .agent-label:hover .al-spec { opacity: 1; }

    /* Header / identity. */
    .hud { position: fixed; z-index: 4; pointer-events: none; }
    .hud.top { top: 0; left: 0; right: 0; padding: 22px 26px; }
    .brand { font-weight: 600; letter-spacing: 0.04em; font-size: 18px; }
    .brand .dot { color: var(--accent); }
    .tagline { font-size: 12px; opacity: 0.55; margin-top: 2px; letter-spacing: 0.02em; }

    /* Dock panels — faint cards on the right edge that agents settle beside. */
    .docks {
      top: 50%; right: 26px; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 14px;
    }
    .docks .panel {
      min-width: 132px; padding: 12px 14px; border-radius: 12px;
      font-size: 12.5px; letter-spacing: 0.03em; color: #cfe;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(6px); display: flex; align-items: center; gap: 9px;
    }
    .docks .panel .p-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4b6; box-shadow: 0 0 8px 1px #4b6; opacity: 0.6;
    }
    @media (max-width: 720px) { .docks { display: none; } }

    /* Performance-mode toggle. */
    .perf {
      bottom: 18px; left: 18px; top: auto; pointer-events: auto; cursor: pointer;
      font: 11px/1 "Inter", system-ui, sans-serif; letter-spacing: 0.06em;
      color: #9fb3c8; padding: 8px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(6px); text-transform: uppercase;
    }
    .perf.on { color: var(--accent); border-color: var(--accent); }

    /* Top-right controls: terminal toggle + ears (clap-wake) status. */
    .controls {
      top: 18px; right: 18px; pointer-events: auto;
      display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
    }
    .chipbtn {
      cursor: pointer; font: 11px/1 "Inter", system-ui, sans-serif;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: #9fb3c8; padding: 8px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(6px);
    }
    .chipbtn:hover { color: #fff; border-color: rgba(255,255,255,0.25); }
    .chipbtn.on  { color: #34d399; border-color: rgba(52,211,153,0.5); }
    .chipbtn.bad { color: #ff6b5e; border-color: rgba(255,107,94,0.5); }

    /* Ears panel: live level meter + the loudness gate slider. The tick on
       the meter is the threshold — only peaks past it can wake Donald. */
    .ears-panel {
      display: flex; flex-direction: column; gap: 7px; align-items: stretch;
      min-width: 190px; padding: 10px 12px; border-radius: 12px;
      background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(6px);
    }
    .ears-panel label {
      font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      color: #9fb3c8;
    }
    .meter {
      position: relative; height: 6px; border-radius: 999px; overflow: hidden;
      background: rgba(255,255,255,0.07);
    }
    .meter .fill {
      position: absolute; inset: 0 auto 0 0; width: 0%;
      background: #9fb3c8; border-radius: 999px; transition: width 60ms linear;
    }
    .meter .fill.hot { background: var(--accent); }
    .ears-panel input[type="range"] { width: 100%; accent-color: var(--accent); }

    /* Live transcript caption while Donald is listening. */
    #caption {
      position: fixed; z-index: 5; left: 50%; bottom: 12vh;
      transform: translateX(-50%); max-width: min(72vw, 720px);
      padding: 10px 18px; border-radius: 14px; text-align: center;
      font-size: 16px; letter-spacing: 0.01em; color: #ffe6c4;
      background: rgba(10, 8, 4, 0.65); border: 1px solid rgba(255,176,46,0.35);
      backdrop-filter: blur(8px); opacity: 0; pointer-events: none;
      transition: opacity 0.15s ease;
    }
    #caption.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="scene">
    <div class="label-layer" id="labels"></div>
  </div>

  <div class="hud top">
    <div class="brand">Donald<span class="dot">.</span></div>
    <div class="tagline">always on — clap (loud) to wake</div>
  </div>

  <!-- Top-right: the terminal page toggle + the ears (clap-wake) controls. -->
  <div class="hud controls">
    <button class="chipbtn" id="term-toggle" title="Ops terminal (` or T)">⌨ terminal</button>
    <button class="chipbtn" id="ears-chip" title="Clap-wake status — click to (re)arm the mic">👂 ears: off</button>
    <div class="ears-panel">
      <label for="clap-threshold">clap loudness gate</label>
      <div class="meter"><div class="fill" id="ears-meter"></div></div>
      <input type="range" id="clap-threshold" min="15" max="90" step="1"
             title="How loud a clap must be to wake Donald. Higher = louder required." />
    </div>
  </div>

  <button class="hud perf" id="perf-toggle" title="Performance mode (P)">⚡ perf</button>

  <!-- Live transcript while listening. -->
  <div id="caption"></div>

  <!-- Optional dock targets. An agent marked working settles near the panel
       whose data-agent matches its id (else it just pulses in orbit). -->
  <div class="hud docks" id="docks">
    <div class="panel" data-agent="hermes"><span class="p-dot"></span>Hermes</div>
    <div class="panel" data-agent="scout"><span class="p-dot"></span>Scout</div>
    <div class="panel" data-agent="forge"><span class="p-dot"></span>Forge</div>
  </div>

  <!--
    three.js is vendored locally (js/lib/three.module.js) so the scene works
    offline and doesn't depend on a CDN being reachable. No build step / no
    bundler — it's just a static ES module. To use a CDN instead, swap the
    path below for: "https://unpkg.com/three@0.160.0/build/three.module.js"
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "./js/lib/three.module.js"
    }
  }
  </script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
