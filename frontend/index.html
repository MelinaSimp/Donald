<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Donald — Voice-First Mobile Agent">
    <title>Donald</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23000' width='180' height='180'/><circle cx='90' cy='90' r='60' fill='%2300d4ff'/></svg>">
    <link rel="manifest" href="/static/manifest.webmanifest">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
        }

        #orbCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: block;
        }

        #statusPill {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px) + 12px);
            left: 12px;
            padding: 6px 12px;
            background: rgba(20, 30, 40, 0.72);
            backdrop-filter: blur(18px) saturate(140%);
            border-radius: 999px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #00d4ff;
            z-index: 10;
        }

        #actionChip {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px) + 56px);
            right: 12px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(20, 30, 40, 0.72);
            backdrop-filter: blur(18px) saturate(140%);
            font-size: 12px;
            color: #fff;
            z-index: 11;
            transform: translateX(calc(100% + 16px));
            transition: transform 0.34s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.28s ease;
            opacity: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        #actionChip.visible {
            opacity: 1;
            transform: translateX(0);
        }

        #actionChip.calling {
            color: #00d4ff;
        }

        #actionChip.success {
            color: #00cc66;
        }

        #actionChip.error {
            color: #ff6666;
        }

        #actionChip.confirm {
            color: #ffaa00;
        }

        #actionChip .spinner {
            display: inline-block;
            width: 8px;
            height: 8px;
            border: 1px solid currentColor;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #transcript {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 60px);
            left: 0;
            right: 0;
            padding: 0 16px;
            text-align: center;
            font-size: 14px;
            line-height: 1.4;
            color: #aaa;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        #tapHint {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #666;
            z-index: 5;
            transition: opacity 0.2s;
        }

        #tapHint.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="orbCanvas"></canvas>

    <div id="statusPill">Idle</div>
    <div id="actionChip"></div>

    <div id="transcript"></div>
    <div id="tapHint">Tap to talk</div>

    <audio id="tts" playsinline preload="auto"
           src="data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQIAAAAAAA=="></audio>

    <script type="module">
        import { setupScene } from '/static/scene.js?v=20260630-initial';
        import { setupVoiceLoop } from '/static/voice.js?v=20260630-initial';

        async function main() {
            console.log('Donald PWA initializing...');

            await setupScene();
            await setupVoiceLoop();

            console.log('Ready to listen.');
        }

        main().catch(err => {
            console.error('Initialization error:', err);
        });
    </script>
</body>
</html>
