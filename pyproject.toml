[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

# This repository is a small monorepo holding two independent packages that
# landed on the same branch:
#   * security/      -- agent-security: dependency-free hardening primitives
#   * src/trillion/  -- trillion: read-only Supabase analytics tool
# They share one distribution + test config but have no runtime coupling.
[project]
name = "donald"
version = "0.1.0"
description = "Monorepo: agent-security hardening library + trillion read-only Supabase tool."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["security", "llm", "agent", "prompt-injection", "hardening", "supabase"]
# Base install is dependency-free (the security library is pure stdlib).
# Trillion's runtime dep lives under the [trillion] extra so security users
# never pull it in.
dependencies = []

[project.optional-dependencies]
# Tooling the CVE scanner shells out to (not imported); install where you scan.
scan = ["pip-audit"]
# Trillion's async Postgres driver.
trillion = ["asyncpg>=0.29"]
# The FastAPI worked example under examples/.
example = ["fastapi", "uvicorn"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.setuptools]
packages = ["security", "trillion", "trillion.tools"]

[tool.setuptools.package-dir]
security = "security"
trillion = "src/trillion"

[tool.pytest.ini_options]
# pytest is the canonical runner for the whole monorepo: it runs both the
# stdlib-unittest security suite and Trillion's pytest-asyncio suite.
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src", "."]
