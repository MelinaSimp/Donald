[project]
name = "agent-factory"
version = "0.1.0"
description = "A meta-agent (the Factory) that designs, prompts, and registers new specialist sub-agents on demand."
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2",
    "anthropic>=0.40",
]

[project.optional-dependencies]
dev = ["pytest>=7"]

[project.scripts]
factory = "agent_factory.cli:main"

[tool.setuptools.packages.find]
include = ["agent_factory*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
