[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "prism-design-agent"
version = "0.1.0"
description = "Prism — a head-of-design sub-agent that composes award-quality Next.js mockups."
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
# Live integrations. None are needed to import the package or run the unit
# ship-tests; install only the ones whose features you intend to use live.
agent = ["anthropic>=0.40"]
images = ["google-genai>=0.3"]
serving = ["fastapi>=0.110", "uvicorn>=0.29"]
dev = ["pytest>=8.0"]

[project.scripts]
prism = "prism.cli:main"

[tool.setuptools]
packages = ["prism"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
