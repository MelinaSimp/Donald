notes: |
  This registry is the source of truth for what skills are available.
  Donald's PresetExecutor loads skills from here and validates inputs/outputs.
  Skills can be added (skills/*/new-skill.yaml) and automatically registered.

  To add a new skill:
    1. Create skills/<Category>/<skill-name>.yaml (use examples as template)
    2. Run: donald skills register skills/<Category>/<skill-name>.yaml
    3. Test: donald skills show <Category>/<skill-name>
    4. Use in preset: add to preset stages
